<div class="flex items-center justify-center">
  <div
    [class]="`${spinnerSizeClasses} animate-spin rounded-full border-solid border-current border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]`"
    role="status"
  >
    <span
      class="absolute -m-px h-px w-px overflow-hidden whitespace-nowrap border-0 p-0 [clip:rect(0,0,0,0)]"
      >Loading...</span>
  </div>
  
  <!-- <img src="assets/png/Timken-loading1.gif " alt="Logo" > -->
</div>
