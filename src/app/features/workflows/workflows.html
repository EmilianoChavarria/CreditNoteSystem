<section class="flex flex-col w-full">
    <header class="w-full flex items-center justify-end">
        <div class="flex flex-col max-w-1/3">
            <span class="text-4xl tracking-wider text-[#ff8200] font-semibold">{{'WORKFLOWS_MANAGE.TITLE' |
                translate}}</span>
            <span class="text-orange-400">{{'WORKFLOWS_MANAGE.DESCRIPTION' | translate}}</span>
        </div>
    </header>
    <div class="w-full flex flex-col p-4">
        <div class="w-full flex items-center justify-end mb-6">
            <button (click)="openModal()"
                class="flex items-center justify-center bg-[#ff8200] rounded-md text-white px-2 py-1 gap-x-2 hover:cursor-pointer hover:bg-[#fd9628]">
                <lucide-icon name="plus" size="18"></lucide-icon>
                Add Role
            </button>
        </div>
        <accordeon-container>
            <accordeon-item title="Num 1" description="desc1">
                <span>Hola mundo</span>
            </accordeon-item>
            <accordeon-item title="Num 1" description="desc1">
                <span>Hola mundo</span>
            </accordeon-item>
            <accordeon-item title="Num 1" description="desc1">
                <span>Hola mundo</span>
            </accordeon-item>
        </accordeon-container>
    </div>

    <app-modal size="lg" titleM="Roles" [open]="isOpenModal()" closeText="Cancelar" primaryText="Guardar"
        (openChange)="showModal($event)" (primaryAction)="saveRole()">

        @if(isLoadingRoles()){
        <app-spinner></app-spinner>
        } @else {
        <div class="max-h-[55vh] overflow-auto">
        <table class="w-full border-collapse">
            <thead class="text-sm text-heading border border-gray-200">
                <tr class="border border-gray-200">
                    <th scope="col" class="sticky top-0 z-10 bg-white px-6 py-3 font-semibold text-center w-60 border border-gray-200">
                        Role
                    </th>
                    <th scope="col" class="sticky top-0 z-10 bg-white px-6 py-3 font-semibold text-center w-60 border border-gray-200">
                        Color
                    </th>
                    <th scope="col" class="sticky top-0 z-10 bg-white px-6 py-3 font-semibold text-center w-60 border border-gray-200">
                        Acciones
                    </th>
                </tr>
            </thead>
            <tbody>
                @for (role of roles(); track role.id) {
                <tr class="border-y border-gray-200">
                    <td class="border-x border-gray-200 py-2">{{role.roleName | titlecase}}</td>
                    <td class="border-x border-gray-200 py-2">
                        <div class=" h-8 w-8 rounded-full mx-auto" [style]="`background-color: ${role.color};`">
                        </div>
                    </td>
                    <td class="border-x border-gray-200 py-2 flex flex-row">
                        <button>
                            <lucide-icon name="pencil" size="18"></lucide-icon>
                        </button>
                        <button>
                            <lucide-icon name="trash" size="18"></lucide-icon>
                        </button>
                        

                    </td>
                </tr>
                }
            </tbody>
        </table>
        </div>
        }

    </app-modal>
</section>
