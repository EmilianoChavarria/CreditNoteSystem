<main class="h-full min-h-[calc(100vh-4rem)] w-full flex items-center justify-center p-8 bg-linear-to-br from-white to-blue-50">
  <section class="w-full max-w-2xl border border-[#ff8200]/30 rounded-2xl shadow-xl bg-white p-10 text-center">
    <div class="mx-auto mb-6 h-20 w-20 rounded-full bg-[#326295]/10 text-[#326295] flex items-center justify-center">
      <lucide-icon name="triangle-alert" [size]="42" [strokeWidth]="1.8"></lucide-icon>
    </div>

    <span class="block text-[#ff8200] font-bold text-6xl tracking-wide">404</span>
    <h1 class="mt-3 text-3xl font-semibold text-[#326295]">Página no encontrada</h1>
    <p class="mt-3 text-gray-600 text-base">
      La ruta que intentaste abrir no existe o fue movida.
    </p>

    <a
      routerLink="/app/dashboard"
      class="mt-8 inline-flex items-center gap-2 bg-[#ff8200] hover:bg-orange-600 text-white px-6 py-3 rounded-lg font-semibold transition-colors"
    >
      <lucide-icon name="arrow-left" [size]="18"></lucide-icon>
      Regresar al dashboard
    </a>
  </section>
</main>
