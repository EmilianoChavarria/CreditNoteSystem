<section class="notifications-page">
	<header class="notifications-header">
		<div>
			<p class="eyebrow">Centro de notificaciones</p>
			<h1>Notificaciones</h1>
			<!-- <p>Se sincronizan con <strong>/api/notifications</strong> y <strong>/api/notifications/unread</strong>.</p> -->
		</div>

		<div class="header-actions">
			<div class="count-card">
				<span class="count-value">{{ unreadCount() }}</span>
				<span class="count-label">sin leer</span>
			</div>
			<button type="button" (click)="refresh()">Actualizar</button>
		</div>
	</header>

	@if (lastError()) {
		<div class="error-banner">
			{{ lastError() }}
		</div>
	}

	<section class="notifications-list">
		@if (notifications().length === 0) {
			<div class="empty-state">
				<p>No hay notificaciones para mostrar.</p>
			</div>
		} @else {
			@for (notification of notifications(); track trackByNotificationId($index, notification)) {
				<button
					type="button"
					class="notification-card"
					[class.unread]="!notification.isRead"
					(click)="markAsRead(notification)">
					<div class="notification-card__header">
						<div class="notification-card__title-group">
							<h2>{{ notification.title }}</h2>
							<p>{{ notification.message }}</p>
						</div>
						<span class="notification-status">{{ notification.isRead ? 'Leída' : 'Nueva' }}</span>
					</div>

					<div class="notification-card__footer">
						<span>{{ formatNotificationDate(notification.createdAt) }}</span>
						@if (notification.type) {
							<span class="notification-type">{{ notification.type }}</span>
						}
					</div>
				</button>
			}
		}
	</section>
</section>
