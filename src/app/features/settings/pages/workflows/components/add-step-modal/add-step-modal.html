<app-modal size="lg" [titleM]="modalTitle()" [open]="open()" closeText="Cancelar" primaryText="Guardar"
    (openChange)="openChange.emit($event)" (primaryAction)="primaryAction.emit()">

    @if (isLoading()) {
    <div class="flex items-center justify-center py-16">
        <app-spinner size="large"></app-spinner>
    </div>
    } @else {
    <form [formGroup]="stepForm()" class="flex flex-col gap-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block font-medium text-[#2f3042] text-lg">Número de paso</label>
                <input type="number" formControlName="stepOrder" min="1"
                    class="mt-2 w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Ej: 1">
            </div>

            <div>
                <label class="block font-medium text-[#2f3042] text-lg">Rol</label>
                <select formControlName="roleId"
                    class="mt-2 w-full border border-gray-300 rounded-md p-2 bg-white focus:ring-blue-500 focus:border-blue-500">
                    <option [ngValue]="null" disabled>Selecciona un rol</option>
                    @for (role of availableRoles(); track role.id) {
                    <option [ngValue]="role.id">{{ role.roleName }}</option>
                    }
                </select>
            </div>
        </div>

        <div class="border-t border-gray-300 pt-4">
            <div class="flex items-center justify-between mb-4">
                <label class="block font-medium text-[#2f3042] text-lg">Condiciones especiales</label>
                <button type="button" (click)="addTransition()"
                    class="flex items-center gap-1 bg-blue-500 text-white px-3 py-1 rounded-md hover:bg-blue-600">
                    <lucide-icon name="plus" size="16"></lucide-icon>
                    Agregar condición
                </button>
            </div>

            @if (transitions().length > 0) {
            <div class="space-y-3">
                @for (transition of transitions(); track $index; let idx = $index) {
                <div class="border border-gray-300 rounded-md p-3 space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Campo</label>
                            <input type="text" placeholder="ej: totalAmount" [(ngModel)]="transition.conditionField"
                                [ngModelOptions]="{standalone: true}"
                                class="w-full border border-gray-300 rounded-md p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Operador</label>
                            <select [(ngModel)]="transition.conditionOperator" [ngModelOptions]="{standalone: true}"
                                class="w-full border border-gray-300 rounded-md p-2 text-sm bg-white">
                                <option value="">Selecciona operador</option>
                                @for (op of operatorOptions; track op.value) {
                                <option [value]="op.label">{{ op.value }}</option>
                                }
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Valor</label>
                            <input type="text" placeholder="ej: 1000" [(ngModel)]="transition.conditionValue"
                                [ngModelOptions]="{standalone: true}"
                                class="w-full border border-gray-300 rounded-md p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Paso destino</label>
                            <select [(ngModel)]="transition.toStepId" [ngModelOptions]="{standalone: true}"
                                class="w-full border border-gray-300 rounded-md p-2 text-sm bg-white">
                                <option [ngValue]="null">Selecciona un paso</option>
                                @for (step of availableSteps(); track step.id) {
                                <option [ngValue]="step.id">{{ step.stepName }} (Paso {{ step.stepOrder }})</option>
                                }
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
                            <input type="number" placeholder="1" [(ngModel)]="transition.priority"
                                [ngModelOptions]="{standalone: true}"
                                class="w-full border border-gray-300 rounded-md p-2 text-sm" min="1">
                        </div>
                    </div>
                    <button type="button" (click)="removeTransition(idx)"
                        class="text-red-500 text-sm hover:text-red-700">Remover</button>
                </div>
                }
            </div>
            }
        </div>
    </form>

    @if (isSaving()) {
    <div class="absolute inset-0 rounded-xl bg-white/70 flex items-center justify-center z-10">
        <app-spinner size="large"></app-spinner>
    </div>
    }
    }

</app-modal>
