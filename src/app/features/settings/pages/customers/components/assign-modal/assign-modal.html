<app-modal size="lg" titleM="Assign Managers" [open]="open()" closeText="Cancelar" primaryText="Save"
    (openChange)="openChange.emit($event)" (primaryAction)="primaryAction.emit()">

    <div class="flex flex-col gap-y-2 max-h-[55vh] overflow-y-auto px-3">
        <app-select
            id="area"
            label="Area"
            placeholder="Select area"
            [options]="areaOptions"
            [value]="area"
            (valueChange)="area = $event"
        />

        <div class="border-t border-gray-200 my-6 flex items-center justify-between w-full">
            <span class="-mt-3 bg-white px-4 text-center mx-auto text-sm text-gray-500">{{'Asignar Managers' | uppercase }}</span>
        </div>

        <div class="w-full gap-x-4 flex flex-row">
            <div class="w-1/2">
                <app-select
                    id="sales-engineer"
                    label="Sales Engineer"
                    placeholder="Select manager"
                    [options]="managerOptions"
                    [value]="salesEngineer"
                    (valueChange)="salesEngineer = $event"
                />
            </div>

            <div class="w-1/2">
                <app-select
                    id="sales-manager"
                    label="Sales Manager"
                    placeholder="Select manager"
                    [options]="managerOptions"
                    [value]="salesManager"
                    (valueChange)="salesManager = $event"
                />
            </div>
        </div>

        <div class="w-full gap-x-4 flex flex-row">
            <div class="w-1/2">
                <app-select
                    id="finance-manager"
                    label="Finance Manager"
                    placeholder="Select manager"
                    [options]="managerOptions"
                    [value]="financeManager"
                    (valueChange)="financeManager = $event"
                />
            </div>

            <div class="w-1/2">
                <app-select
                    id="marketing-manager"
                    label="Marketing Manager"
                    placeholder="Select manager"
                    [options]="managerOptions"
                    [value]="marketingManager"
                    (valueChange)="marketingManager = $event"
                />
            </div>
        </div>

        <div class="w-full gap-x-4 flex flex-row pb-1">
            <div class="w-1/2">
                <app-select
                    id="cs-manager"
                    label="CS Manager"
                    placeholder="Select manager"
                    [options]="managerOptions"
                    [value]="csManager"
                    (valueChange)="csManager = $event"
                />
            </div>
        </div>

    </div>

</app-modal>
