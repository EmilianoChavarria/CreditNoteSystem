<app-modal size="lg" titleM="Assign Managers" [open]="open()" closeText="Cancelar" primaryText="Save"
    (openChange)="openChange.emit($event)" (primaryAction)="primaryAction.emit()">

    <div class="flex flex-col gap-y-2 max-h-[55vh] overflow-y-auto px-3">
        <div class="">
            <label class="block font-medium text-[#2f3042] text-lg">Area</label>
            <select name="request_type" id="request_type" formControlName="requestTypeId"
                class="mt-2 h-9 border w-full border-gray-300 rounded-lg pl-2 pr-4">
                <option value="SALES">Sales</option>
                <option value="AFTERMARKET">Aftermarket</option>
            </select>
        </div>
        <div class="border-t border-gray-200 my-6 flex items-center justify-between w-full">
            <span class="-mt-3 bg-white px-4 text-center mx-auto text-sm text-gray-500">{{'Asignar Managers' | uppercase }}</span>
        </div>
        <div class="w-full gap-x-4 flex flex-row">
            <div class="w-1/2">
                <label class="block font-medium text-[#2f3042] text-lg">Sales Engineer</label>
                <select name="request_type" id="request_type" formControlName="requestTypeId"
                    class="mt-2 h-9 border w-full border-gray-300 rounded-lg pl-2 pr-4">
                    <option value="SALES">Sales</option>
                    <option value="AFTERMARKET">Aftermarket</option>
                </select>
            </div>
            <div class="w-1/2">
                <label class="block font-medium text-[#2f3042] text-lg">Sales Manager</label>
                <select name="request_type" id="request_type" formControlName="requestTypeId"
                    class="mt-2 h-9 border w-full border-gray-300 rounded-lg pl-2 pr-4">
                    <option value="SALES">Sales</option>
                    <option value="AFTERMARKET">Aftermarket</option>
                </select>
            </div>
        </div>
        <div class="w-full gap-x-4 flex flex-row">
            <div class="w-1/2">
                <label class="block font-medium text-[#2f3042] text-lg">Finance Manager</label>
                <select name="request_type" id="request_type" formControlName="requestTypeId"
                    class="mt-2 h-9 border w-full border-gray-300 rounded-lg pl-2 pr-4">
                    <option value="SALES">Sales</option>
                    <option value="AFTERMARKET">Aftermarket</option>
                </select>
            </div>
            <div class="w-1/2">
                <label class="block font-medium text-[#2f3042] text-lg">Marketing Manager</label>
                <select name="request_type" id="request_type" formControlName="requestTypeId"
                    class="mt-2 h-9 border w-full border-gray-300 rounded-lg pl-2 pr-4">
                    <option value="SALES">Sales</option>
                    <option value="AFTERMARKET">Aftermarket</option>
                </select>
            </div>
        </div>
        <div class="w-full gap-x-4 flex flex-row">
            <div class="w-1/2">
                <label class="block font-medium text-[#2f3042] text-lg">CS Manager</label>
                <select name="request_type" id="request_type" formControlName="requestTypeId"
                    class="mt-2 h-9 border w-full border-gray-300 rounded-lg pl-2 pr-4">
                    <option value="SALES">Sales</option>
                    <option value="AFTERMARKET">Aftermarket</option>
                </select>
            </div>
            
        </div>

    </div>

</app-modal>
