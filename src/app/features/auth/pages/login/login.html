<main class="h-screen w-full flex flex-col gap-y-10 items-center justify-center">
    <img src="assets/svg/LTM.svg" alt="Logo Timken" class="h-20" style="fill: white !important;">
    <form class="shadow-2xl w-1/4 flex flex-col p-8 gap-y-6 rounded-lg" [formGroup]="form" (ngSubmit)="onSubmit()">
        <span class="text-center w-full text-[#ff8200] font-semibold text-2xl">
            Sign In
        </span>

        @if (errorMessage !== '') {
        <div class="w-full rounded-md bg-red-200 h-fit flex items-center justify-start p-4 text-red-800 gap-x-4">
            <lucide-icon name="circle-x"></lucide-icon>
            <span class="">{{errorMessage}}</span>
        </div>
        }

        <div>
            <label for="email">Email</label>
            <input type="email" id="email"
                class="mt-2 w-full border border-gray-300 rounded-md p-2 h-11 focus:outline-2 focus:outline-offset focus:outline-[#ff8200] disabled:bg-gray-100 disabled:cursor-not-allowed disabled:text-gray-400"
                placeholder="example@mail.com" formControlName="email">
        </div>
        <div class="w-full">
            <label class="block text-foreground">Password</label>
            <div class="relative mt-2">
                <input [type]="showPassword ? 'text' : 'password'"
                    class="p-2 h-11 w-full border border-gray-300 rounded-lg disabled:bg-gray-100 disabled:cursor-not-allowed disabled:text-gray-400"
                    placeholder="Enter password" value="12345qwerty" formControlName="password">
                <button (click)="togglePassword()" type="button"
                    class="absolute inset-y-0 end-0 flex items-center z-20 px-3 rounded-e-md transition-colors focus:outline-hidden disabled:cursor-not-allowed disabled:opacity-50 hover:cursor-pointer hover:bg-gray-200"
                    [disabled]="isLoading">
                    <lucide-icon [name]="showPassword ? 'eye-closed' : 'eye'" [size]="24" color="#302F2F" [strokeWidth]="1.5"></lucide-icon>
                </button>
            </div>
        </div>
        <button class="bg-[#ff8200] text-white py-2 rounded-md hover:bg-[#e67300] transition-colors hover:cursor-pointer"
            [disabled]="isLoading">
            @if (isLoading) {
            <app-spinner size="small" class="text-white"></app-spinner>
            } @else {
            <span>Log in</span>
            }
        </button>
    </form>
</main>
