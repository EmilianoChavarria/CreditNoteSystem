<accordeon-item titleM="Upload New Requests" description="Upload csv with requests info">
    <div class="w-full flex flex-col p-4">
        <div class="flex flex-wrap items-end justify-start gap-4">
            <div class="flex flex-col gap-1 min-w-44">
                <span class="text-sm font-medium text-[#395f93]">Batch Type</span>
                <input
                    type="text"
                    value="newRequest"
                    disabled
                    class="h-10 border border-gray-200 rounded-md px-2 bg-gray-100 text-gray-600" />
            </div>

            <button class="bg-[#ff8200] text-white rounded-md px-2 hover:cursor-pointer hover:bg-[#fc9629]">Template</button>

            <button
                type="button"
                (click)="createBatch()"
                [disabled]="isCreatingBatch()"
                class="bg-[#395f93] text-white rounded-md px-4 py-2 hover:cursor-pointer hover:bg-[#4d6ea5] disabled:opacity-70 disabled:cursor-not-allowed">
                {{ isCreatingBatch() ? 'Enviando...' : 'Procesar Batch' }}
            </button>
        </div>
        <div class="flex items-center justify-center w-full mt-4">
            <label for="dropzone-file-new-request"
                class="flex flex-col items-center justify-center w-full h-64 bg-blue-50 border border-dashed bg-cover border-default-strong border-blue-600 rounded-md cursor-pointer hover:bg-neutral-tertiary-medium"
                [class.bg-blue-100]="isDragOver()" [class.border-[#ff8200]]="isDragOver()"
                (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
                (drop)="onDrop($event)">
                <div class="flex flex-col items-center justify-center text-body pt-5 pb-6">
                    <img src="assets/svg/cloud.svg" alt="Logo" class="h-32 my-6">
                    <p class="mb-2 text-xl">
                        Drag and drop file here or
                        <span class="font-semibold text-[#ff8200]">
                            Click to upload
                        </span>
                    </p>
                </div>
                <input id="dropzone-file-new-request" type="file" class="hidden" accept=".csv"
                    (change)="onFileInputChange($event)" />
            </label>
        </div>

        @if (uploadedFiles().length > 0) {
        <div class="w-full mt-4 overflow-x-auto rounded-md border border-gray-200">
            <table class="w-full min-w-175 border-collapse">
                <thead class="bg-gray-50">
                    <tr>
                        <th
                            class="border-b border-gray-200 px-4 py-2 text-left text-xs font-semibold text-gray-600">
                            Nombre del archivo</th>
                        <th
                            class="border-b border-gray-200 px-4 py-2 text-left text-xs font-semibold text-gray-600">
                            Tamaño</th>
                        <th
                            class="border-b border-gray-200 px-4 py-2 text-left text-xs font-semibold text-gray-600">
                            Tipo</th>
                        <th
                            class="border-b border-gray-200 px-4 py-2 text-left text-xs font-semibold text-gray-600">
                            Subido el</th>
                        <th
                            class="border-b border-gray-200 px-4 py-2 text-left text-xs font-semibold text-gray-600">
                            Accciones</th>
                    </tr>
                </thead>
                <tbody>
                    @for (file of uploadedFiles(); track file.name + file.uploadedAt + file.sizeLabel) {
                    <tr class="hover:bg-gray-50">
                        <td class="border-b border-gray-100 px-4 py-2 text-sm text-gray-700">{{
                            file.name }}</td>
                        <td class="border-b border-gray-100 px-4 py-2 text-sm text-gray-700">{{
                            file.sizeLabel }}</td>
                        <td class="border-b border-gray-100 px-4 py-2 text-sm text-gray-700">{{
                            file.type }}</td>
                        <td class="border-b border-gray-100 px-4 py-2 text-sm text-gray-700">{{
                            file.uploadedAt }}</td>
                        <td class="border-b border-gray-100 px-4 py-2 text-gray-700">
                            <button
                                type="button"
                                (click)="removeUploadedFile($index)"
                                class="p-1 text-[#fb2c36] bg-[#fb2c361a] rounded-md hover:cursor-pointer">
                                <lucide-icon name="trash" size="18"></lucide-icon>
                            </button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
        }
    </div>
</accordeon-item>
