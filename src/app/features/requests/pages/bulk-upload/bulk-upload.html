<div class="w-full">
    
    <app-tabs-container #bulkTabs [showBottomButtons]="false" [initialTabIndex]="initialTabIndex()">
        <app-tab titleT="Bulk Upload">
            <div class="p-4 pb-0">
                <div class="flex flex-col gap-1 min-w-64 max-w-md">
                    <span class="text-sm font-medium text-[#395f93]">Request Type <span class="text-red-500">*</span></span>
                    <select
                        class="h-10 border border-gray-300 rounded-md px-2"
                        [value]="selectedRequestTypeId() || ''"
                        (change)="onRequestTypeChange($event)">
                        <option value="" disabled>Selecciona un request type</option>
                        @for (type of availableRequestTypes(); track type.id) {
                        <option [value]="type.id">{{ type.name }}</option>
                        }
                    </select>
                </div>
            </div>
            <accordeon-container>
                <app-bulk-new-requests-upload
                    [selectedRequestTypeId]="selectedRequestTypeId()"
                    (batchCreated)="onUploadBatchCreated()"></app-bulk-new-requests-upload>

                <app-bulk-upload-support-upload
                    [selectedRequestTypeId]="selectedRequestTypeId()"
                    (batchCreated)="onUploadBatchCreated()"></app-bulk-upload-support-upload>

                <app-bulk-order-numbers-upload
                    [selectedRequestTypeId]="selectedRequestTypeId()"
                    (batchCreated)="onUploadBatchCreated()"></app-bulk-order-numbers-upload>

                <app-bulk-credits-data-upload
                    [requestTypes]="availableRequestTypes()"
                    [selectedRequestTypeId]="selectedRequestTypeId()"
                    (batchCreated)="onUploadBatchCreated()"></app-bulk-credits-data-upload>

                <app-bulk-sap-return-order-upload
                    [requestTypes]="availableRequestTypes()"
                    [selectedRequestTypeId]="selectedRequestTypeId()"
                    (batchCreated)="onUploadBatchCreated()"></app-bulk-sap-return-order-upload>
                
            </accordeon-container>
        </app-tab>
        <app-tab titleT="Bulk History">
            <app-bulk-history-tab
                [isLoadingHistory]="isLoadingHistory()"
                [bulkHistoryRows]="bulkHistoryRows()"
                [historyFrom]="historyFrom()"
                [historyTo]="historyTo()"
                [historyTotal]="historyTotal()"
                [historyPageSize]="historyPageSize()"
                [historyCurrentPage]="historyCurrentPage()"
                [historyLastPage]="historyLastPage()"
                [historyHasPrevPage]="historyHasPrevPage()"
                [historyHasNextPage]="historyHasNextPage()"
                (openBatchDetail)="openBatchDetail($event)"
                (historyPageSizeChange)="onHistoryPageSizeChangeValue($event)"
                (historyFirstPage)="onHistoryFirstPage()"
                (historyPrevPage)="onHistoryPrevPage()"
                (historyNextPage)="onHistoryNextPage()"
                (historyLastPageClick)="onHistoryLastPage()"></app-bulk-history-tab>

            <app-batch-requests-modal
                [open]="isBatchDetailModalOpen()"
                [selectedBatchSummary]="selectedBatchSummary()"
                [selectedBatchErrors]="selectedBatchErrors()"
                [isLoadingBatchRequests]="isLoadingBatchRequests()"
                [batchRequestRows]="batchRequestRows()"
                [batchRequestsFrom]="batchRequestsFrom()"
                [batchRequestsTo]="batchRequestsTo()"
                [batchRequestsTotal]="batchRequestsTotal()"
                [batchRequestsPageSize]="batchRequestsPageSize()"
                [batchRequestsCurrentPage]="batchRequestsCurrentPage()"
                [batchRequestsLastPage]="batchRequestsLastPage()"
                [batchRequestsHasPrevPage]="batchRequestsHasPrevPage()"
                [batchRequestsHasNextPage]="batchRequestsHasNextPage()"
                (openChange)="closeBatchDetailModal($event)"
                (openRequestError)="openRequestErrorModal($event)"
                (batchRequestsPageSizeChange)="onBatchRequestsPageSizeChangeValue($event)"
                (batchRequestsFirstPage)="onBatchRequestsFirstPage()"
                (batchRequestsPrevPage)="onBatchRequestsPrevPage()"
                (batchRequestsNextPage)="onBatchRequestsNextPage()"
                (batchRequestsLastPageClick)="onBatchRequestsLastPage()"></app-batch-requests-modal>

            <app-request-error-modal
                [open]="isRequestErrorModalOpen()"
                [selectedRequestError]="selectedRequestError()"
                (openChange)="closeRequestErrorModal($event)"></app-request-error-modal>
        </app-tab>
    </app-tabs-container>

</div>
